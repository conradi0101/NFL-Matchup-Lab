<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Matchup Lab - Head-to-Head</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/matchup.css">
</head>

<body>

    <!-- NavBar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">NFL Matchup Lab</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="teams.html">Teams</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="matchup.html">Head-to-Head</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="saved.html">History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main (Head - to - Head) -->

    <section class="container py-5">

        <h2 class="text-center mb-4">Build Your Matchup</h2>

        <div class="row mb-5">
            <div id="topMessage" class="alert alert-warning d-none text-center">

            </div>
            <div class="col-md-6">
                <select id="teamA" class="form-select">
                    <option>Select Team A</option>
                </select>
            </div>

            <div class="col-md-6">
                <select id="teamB" class="form-select">
                    <option>Select Team B</option>
                </select>
            </div>
        </div>

        <!-- FIELD -->
        <div id="field" class="football-field">

            <!-- Offense -->

            <button class="position-slot wr1" data-position="WR" data-slot="wr1">WR</button>
            <button class="position-slot wr2" data-position="WR" data-slot="wr2">WR</button>
            <button class="position-slot wr3" data-position="WR" data-slot="wr3">WR</button>

            <button class="position-slot qb" data-position="QB" data-slot="qb1">QB</button>

            <button class="position-slot rb" data-position="RB" data-slot="rb1">RB</button>

            <button class="position-slot te" data-position="TE" data-slot="te1">TE</button>

            <button class="position-slot ot1" data-position="OT" data-slot="ot1">OT</button>
            <button class="position-slot ot2" data-position="OT" data-slot="ot2">OT</button>

            <button class="position-slot g1" data-position="G" data-slot="g1">G</button>
            <button class="position-slot g2" data-position="G" data-slot="g2">G</button>

            <button class="position-slot c" data-position="C" data-slot="c1">C</button>

            <button class="position-slot pk" data-position="PK" data-slot="pk1">PK</button>


            <!-- DEFENSE -->


            <button class="position-slot de1" data-position="DE" data-slot="de1">DE</button>
            <button class="position-slot de2" data-position="DE" data-slot="de2">DE</button>

            <button class="position-slot dt1" data-position="DT" data-slot="dt1">DT</button>
            <button class="position-slot dt2" data-position="DT" data-slot="dt2">DT</button>

            <button class="position-slot lb1" data-position="LB" data-slot="lb1">LB</button>
            <button class="position-slot lb2" data-position="LB" data-slot="lb2">LB</button>
            <button class="position-slot lb3" data-position="LB" data-slot="lb3">LB</button>

            <button class="position-slot cb1" data-position="CB" data-slot="cb1">CB</button>
            <button class="position-slot cb2" data-position="CB" data-slot="cb2">CB</button>

            <button class="position-slot ss1" data-position="SS" data-slot="ss1">SS</button>
            <button class="position-slot ss2" data-position="SS" data-slot="ss2">SS</button>


        </div>

        <!-- ROSTER -->
        <div id="roster" class="mt-5">
            <h1>ROSTER</h1>
        </div>
        <!-- STATUS -->
        <div id="stats" class="mt-5">
            <h1>Status</h1>
        </div>

    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <div class="row align-items-center">

                <div class="col-md-6 text-center text-md-start">
                    <h5 class="fw-bold mb-1">NFL Matchup Lab</h5>
                    <p class="mb-3 text-light ">A project to compare real NFL teams and build head-to-head matchups.</p>
                </div>

                <div class="col-md-6 text-center text-md-end">
                    <a href="teams.html" class="text-white me-3 text-decoration-none">Teams</a>
                    <a href="matchup.html" class="text-white me-3 text-decoration-none">Matchup</a>
                    <a href="saved.html" class="text-white me-3 text-decoration-none">History</a>
                </div>

            </div>

            <hr class="border-secondary">

            <div class="text-center text-light small">
                © 2026 NFL Matchup Lab — Built for learning and portfolio purposes.
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div class="modal fade" id="playerModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Select Player</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="modalBody">
                    <!-- Players will appear here -->
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Animation Section -->
    <script src="assets/js/animation.js"></script>

    <!-- SCRIPT -->
    <script src="assets/js/matchup.js"></script>
    <script src="assets/js/utils.js"></script>


</body>

</html>
